# StackHost configuration file
# Version: 2.0.0

user:
  name: ttaivd2-svg
  github: ttaivd2-svg

runtime:
  image: python:3.11-slim

commands:
  build:
    - cd video_downloader && pip install -r requirements.txt
  start: cd video_downloader && python bot.py

repository:
  branch: main
  auto_deploy: true

env:
  - PYTHON_VERSION:3.11.9
  - DOWNLOAD_DIR:/tmp/tiktok-videos
  - RETRY_DELAYS_SECONDS:300,900,1800