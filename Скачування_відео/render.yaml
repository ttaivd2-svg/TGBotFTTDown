services:
  - type: web
    name: tiktok-telegram-downloader
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: BOT_TOKEN
        sync: false
      - key: DOWNLOAD_DIR
        value: /tmp/tiktok-videos
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REFRESH_TOKEN
        sync: false
      - key: RETRY_DELAYS_SECONDS
        value: 300,900,1800
